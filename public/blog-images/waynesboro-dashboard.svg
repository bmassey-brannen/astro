<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" role="img" aria-labelledby="title desc">
  <title id="title">Waynesboro Public Dashboard</title>
  <desc id="desc">A civic dashboard illustration with map, agenda, source cards, and public data rails.</desc>
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#f7f4ea"/>
      <stop offset="55%" stop-color="#eef5ec"/>
      <stop offset="100%" stop-color="#dfeede"/>
    </linearGradient>
    <linearGradient id="panel" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#f3f7ef"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="22" flood-color="#16351f" flood-opacity="0.16"/>
    </filter>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)"/>
  <circle cx="1060" cy="90" r="210" fill="#ffffff" opacity="0.35"/>
  <circle cx="140" cy="570" r="260" fill="#2f6b3b" opacity="0.08"/>

  <g transform="translate(76 70)">
    <text x="0" y="0" font-family="Georgia, 'Times New Roman', serif" font-size="32" font-weight="700" fill="#17351f">BenBrannen.com</text>
    <text x="0" y="44" font-family="Inter, Arial, sans-serif" font-size="20" letter-spacing="3" fill="#55745d">PUBLIC RECORDS · CIVIC INTELLIGENCE · WAYNESBORO</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="94" y="150" width="1012" height="380" rx="30" fill="url(#panel)" stroke="#d3decf"/>
    <rect x="122" y="182" width="956" height="58" rx="16" fill="#17351f"/>
    <circle cx="158" cy="211" r="8" fill="#f7f4ea" opacity="0.9"/>
    <circle cx="184" cy="211" r="8" fill="#95b58d" opacity="0.9"/>
    <circle cx="210" cy="211" r="8" fill="#d7c78d" opacity="0.9"/>
    <text x="246" y="219" font-family="Inter, Arial, sans-serif" font-size="22" font-weight="700" fill="#f7f4ea">Waynesboro Operating Picture</text>

    <g transform="translate(122 270)">
      <rect x="0" y="0" width="330" height="210" rx="20" fill="#e8efe4" stroke="#c8d6c3"/>
      <path d="M36 154 C86 92, 124 114, 176 60 S266 52, 298 24" fill="none" stroke="#2f6b3b" stroke-width="8" stroke-linecap="round" opacity="0.85"/>
      <path d="M56 38 L104 66 L148 48 L218 96 L286 78" fill="none" stroke="#b9a45f" stroke-width="5" stroke-linecap="round" opacity="0.8"/>
      <rect x="44" y="118" width="58" height="38" rx="8" fill="#ffffff" stroke="#becbbe"/>
      <rect x="132" y="96" width="78" height="48" rx="8" fill="#ffffff" stroke="#becbbe"/>
      <rect x="226" y="134" width="52" height="42" rx="8" fill="#ffffff" stroke="#becbbe"/>
      <circle cx="168" cy="120" r="12" fill="#2f6b3b"/>
      <text x="28" y="198" font-family="Inter, Arial, sans-serif" font-size="16" font-weight="700" fill="#17351f">Map + project context</text>
    </g>

    <g transform="translate(486 270)">
      <rect x="0" y="0" width="270" height="210" rx="20" fill="#ffffff" stroke="#d3decf"/>
      <text x="24" y="38" font-family="Inter, Arial, sans-serif" font-size="18" font-weight="800" fill="#17351f">Meeting Watch</text>
      <rect x="24" y="62" width="222" height="28" rx="8" fill="#eef5ec"/>
      <rect x="24" y="102" width="222" height="28" rx="8" fill="#eef5ec"/>
      <rect x="24" y="142" width="164" height="28" rx="8" fill="#eef5ec"/>
      <circle cx="222" cy="156" r="13" fill="#2f6b3b"/>
      <path d="M216 156 l5 5 l10 -12" fill="none" stroke="#fff" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
    </g>

    <g transform="translate(790 270)">
      <rect x="0" y="0" width="288" height="210" rx="20" fill="#ffffff" stroke="#d3decf"/>
      <text x="24" y="38" font-family="Inter, Arial, sans-serif" font-size="18" font-weight="800" fill="#17351f">Source Rails</text>
      <g font-family="Inter, Arial, sans-serif" font-size="15" fill="#45634b">
        <text x="24" y="76">• City agendas + minutes</text>
        <text x="24" y="108">• Public budget documents</text>
        <text x="24" y="140">• GIS / parcel references</text>
        <text x="24" y="172">• State + federal datasets</text>
      </g>
    </g>
  </g>

  <text x="94" y="584" font-family="Georgia, 'Times New Roman', serif" font-size="36" font-weight="700" fill="#17351f">A dashboard for following the paperwork.</text>
</svg>
