<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1100 620" role="img" aria-labelledby="title desc">
<title id="title">Long call versus diagonal payoff sketch</title>
<desc id="desc">A simplified payoff chart comparing a long LEAP call to a diagonal call spread with capped upside near the short strike.</desc>
<rect width="1100" height="620" fill="#f6f0df"/>
<text x="62" y="65" font-family="Georgia, serif" font-size="34" fill="#102016">The trade-off: cheaper exposure, capped zone</text>
<text x="62" y="98" font-family="Inter, Arial, sans-serif" font-size="18" fill="#344337">Illustrative only. Real options also move with IV, rates, dividends, spreads, and time decay.</text>
<g transform="translate(90,135)">
  <rect x="0" y="0" width="930" height="395" rx="16" fill="#fffaf0" stroke="#d1c498"/>
  <line x1="70" y1="315" x2="860" y2="315" stroke="#4e5f50" stroke-width="2"/>
  <line x1="70" y1="40" x2="70" y2="340" stroke="#4e5f50" stroke-width="2"/>
  <text x="820" y="352" font-family="Inter, Arial" font-size="15" fill="#4b584d">Stock price</text>
  <text x="10" y="50" font-family="Inter, Arial" font-size="15" fill="#4b584d">P/L</text>
  <line x1="185" y1="40" x2="185" y2="330" stroke="#8a815d" stroke-dasharray="7 8"/>
  <text x="146" y="365" font-family="Inter, Arial" font-size="15" fill="#5a523e">long strike</text>
  <line x1="620" y1="40" x2="620" y2="330" stroke="#a35b3b" stroke-dasharray="7 8"/>
  <text x="575" y="365" font-family="Inter, Arial" font-size="15" fill="#7a3d25">short strike</text>
  <path d="M70 315 L250 315 L800 70" fill="none" stroke="#183d28" stroke-width="7" stroke-linecap="round"/>
  <path d="M70 285 C180 290 255 290 330 260 C450 214 555 150 620 122 C660 105 725 112 805 138" fill="none" stroke="#c28b2c" stroke-width="7" stroke-linecap="round"/>
  <circle cx="620" cy="122" r="7" fill="#a35b3b"/>
  <text x="645" y="126" font-family="Inter, Arial" font-size="16" fill="#7a3d25">cap/pressure zone</text>
  <g transform="translate(455,230)">
    <rect x="0" y="0" width="360" height="84" rx="12" fill="#f6f0df" stroke="#d1c498"/>
    <line x1="20" y1="25" x2="80" y2="25" stroke="#183d28" stroke-width="6"/>
    <text x="94" y="31" font-family="Inter, Arial" font-size="16" fill="#243127">plain LEAP call keeps upside open</text>
    <line x1="20" y1="58" x2="80" y2="58" stroke="#c28b2c" stroke-width="6"/>
    <text x="94" y="64" font-family="Inter, Arial" font-size="16" fill="#243127">diagonal reduces cost but creates a ceiling</text>
  </g>
</g>
</svg>