<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" role="img" aria-labelledby="title desc">
<title id="title">LEAPs and diagonal call structure</title>
<desc id="desc">A dark editorial market diagram showing a long dated call as core exposure and shorter dated calls as financing.</desc>
<defs>
  <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
    <stop offset="0" stop-color="#101812"/>
    <stop offset="0.55" stop-color="#18251b"/>
    <stop offset="1" stop-color="#07100b"/>
  </linearGradient>
  <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="16" stdDeviation="20" flood-color="#000" flood-opacity="0.35"/></filter>
</defs>
<rect width="1200" height="630" fill="url(#bg)"/>
<path d="M60 520 C210 460 260 340 395 350 C530 360 555 210 690 230 C825 250 870 125 1030 105" fill="none" stroke="#c9b46b" stroke-width="7" stroke-linecap="round"/>
<path d="M88 520 H1088" stroke="#5f6f5f" stroke-width="2" opacity="0.55"/>
<path d="M128 530 V106" stroke="#5f6f5f" stroke-width="2" opacity="0.45"/>
<g filter="url(#shadow)">
  <rect x="152" y="96" width="370" height="132" rx="18" fill="#f3ead4"/>
  <text x="184" y="146" font-family="Georgia, serif" font-size="33" fill="#142015">LEAP call</text>
  <text x="184" y="184" font-family="Inter, Arial, sans-serif" font-size="18" fill="#334235">Core upside exposure. More time,</text>
  <text x="184" y="210" font-family="Inter, Arial, sans-serif" font-size="18" fill="#334235">defined risk, less daily panic.</text>
</g>
<g filter="url(#shadow)">
  <rect x="646" y="346" width="390" height="150" rx="18" fill="#122418" stroke="#c9b46b" stroke-width="2"/>
  <text x="680" y="397" font-family="Georgia, serif" font-size="32" fill="#f3ead4">Short call sleeve</text>
  <text x="680" y="435" font-family="Inter, Arial, sans-serif" font-size="18" fill="#d9cfad">Financing only if the strike is a price</text>
  <text x="680" y="461" font-family="Inter, Arial, sans-serif" font-size="18" fill="#d9cfad">you are actually willing to cap.</text>
</g>
<text x="70" y="584" font-family="Inter, Arial, sans-serif" font-size="18" letter-spacing="3" fill="#c9b46b">SMALL TOWN CAPITAL / STRUCTURE NOTES</text>
</svg>