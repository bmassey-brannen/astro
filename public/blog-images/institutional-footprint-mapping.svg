    <path d="M95 160 H1110"/>
    <path d="M95 240 H1110"/>
    <path d="M95 320 H1110"/>
    <path d="M95 400 H1110"/>
    <path d="M95 480 H1110"/>
    <path d="M180 55 V550"/>
    <path d="M360 55 V550"/>
    <path d="M540 55 V550"/>
    <path d="M720 55 V550"/>
    <path d="M900 55 V550"/>
