<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-labelledby="title desc">
  <title id="title">Institutional footprint mapping</title>
  <desc id="desc">A dark research desk graphic with filing cards, ownership paths, and institutional footprint nodes.</desc>
  <defs>
    <linearGradient id="paper" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#f4ead7"/>
      <stop offset="1" stop-color="#dcc9a5"/>
    </linearGradient>
    <linearGradient id="field" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#10251d"/>
      <stop offset="1" stop-color="#07130f"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="18" flood-color="#000000" flood-opacity="0.35"/>
    </filter>
  </defs>

  <rect width="1200" height="630" fill="url(#field)"/>
  <path d="M0 92 C180 45 300 150 480 94 C650 42 810 92 1200 36 L1200 0 L0 0 Z" fill="#1f4634" opacity="0.34"/>
  <path d="M0 565 C185 505 340 585 530 535 C760 474 940 548 1200 500 L1200 630 L0 630 Z" fill="#c89b3c" opacity="0.12"/>

