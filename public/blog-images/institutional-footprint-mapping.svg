    <rect x="118" y="112" width="190" height="18" rx="9" fill="#143726" opacity="0.9"/>
    <rect x="118" y="154" width="332" height="10" rx="5" fill="#143726" opacity="0.35"/>
    <rect x="118" y="184" width="280" height="10" rx="5" fill="#143726" opacity="0.28"/>
    <rect x="118" y="214" width="356" height="10" rx="5" fill="#143726" opacity="0.32"/>
    <rect x="118" y="272" width="250" height="12" rx="6" fill="#9d7426" opacity="0.65"/>
    <rect x="118" y="306" width="360" height="10" rx="5" fill="#143726" opacity="0.3"/>
    <rect x="118" y="336" width="305" height="10" rx="5" fill="#143726" opacity="0.25"/>
    <rect x="118" y="396" width="154" height="34" rx="17" fill="#143726" opacity="0.92"/>
    <text x="144" y="419" font-family="Georgia, serif" font-size="18" fill="#f4ead7">13F trail</text>
  </g>

  <g fill="none" stroke-linecap="round" stroke-linejoin="round">
    <path d="M610 168 C705 105 780 124 862 182 C940 238 1004 226 1080 188" stroke="#d2a242" stroke-width="5" opacity="0.86"/>
    <path d="M610 310 C720 266 784 292 850 352 C914 410 997 392 1080 332" stroke="#f4ead7" stroke-width="4" opacity="0.7"/>
    <path d="M610 450 C705 478 785 438 858 468 C927 496 1000 482 1080 430" stroke="#75a884" stroke-width="5" opacity="0.75"/>
