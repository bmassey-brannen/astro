    <circle cx="862" cy="182" r="28" fill="#f4ead7"/>
    <circle cx="1080" cy="188" r="18" fill="#75a884"/>
    <circle cx="610" cy="310" r="18" fill="#f4ead7"/>
    <circle cx="850" cy="352" r="24" fill="#75a884"/>
    <circle cx="1080" cy="332" r="18" fill="#d2a242"/>
    <circle cx="610" cy="450" r="18" fill="#75a884"/>
