<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 675" role="img" aria-labelledby="title desc"><title id="title">Options Council and Short Call Warden</title><desc id="desc">A financial risk graph surrounded by council panels showing convexity, theta, risk, tactic, and commander.</desc><defs><linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#111318"/><stop offset="1" stop-color="#20252b"/></linearGradient><filter id="glow"><feGaussianBlur stdDeviation="5" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter></defs><rect width="1200" height="675" fill="url(#bg)"/><g opacity=".13" stroke="#f3ead2"><path d="M0 520h1200M0 430h1200M0 340h1200M0 250h1200M0 160h1200M180 0v675M360 0v675M540 0v675M720 0v675M900 0v675M1080 0v675"/></g><rect x="270" y="120" width="660" height="405" rx="30" fill="#0c1015" stroke="#f3ead2" stroke-opacity=".22" stroke-width="2"/><text x="600" y="172" text-anchor="middle" font-family="Inter, Arial" font-size="34" font-weight="800" fill="#f3ead2">Options Council</text><g transform="translate(340 230)"><path d="M0 230 L110 230 L230 188 L350 112 L500 25" fill="none" stroke="#2ee68c" stroke-width="10" filter="url(#glow)"/><path d="M350 30 V240" stroke="#f2a93b" stroke-width="9" stroke-dasharray="16 12"/><rect x="327" y="42" width="46" height="68" rx="14" fill="none" stroke="#f2a93b" stroke-width="6"/><circle cx="350" cy="98" r="7" fill="#f2a93b"/><text x="350" y="272" text-anchor="middle" font-family="Inter, Arial" font-size="24" font-weight="700" fill="#f2a93b">Short-call cap</text><path d="M0 230H520" stroke="#f3ead2" opacity=".35"/><path d="M0 20V245" stroke="#f3ead2" opacity=".35"/></g><g font-family="Inter, Arial" font-weight="800" font-size="22" fill="#f3ead2"><g><rect x="70" y="100" width="190" height="76" rx="20" fill="#16291f" stroke="#2ee68c"/><text x="165" y="146" text-anchor="middle">Convexity</text></g><g><rect x="75" y="285" width="175" height="76" rx="20" fill="#2d2417" stroke="#f2a93b"/><text x="162" y="331" text-anchor="middle">Theta</text></g><g><rect x="95" y="475" width="160" height="76" rx="20" fill="#2a1717" stroke="#d66b57"/><text x="175" y="521" text-anchor="middle">Risk</text></g><g><rect x="955" y="155" width="150" height="76" rx="20" fill="#182b36" stroke="#74c7ec"/><text x="1030" y="201" text-anchor="middle">Tactic</text></g><g><rect x="935" y="410" width="190" height="76" rx="20" fill="#25202f" stroke="#d8c6ff"/><text x="1030" y="456" text-anchor="middle">Commander</text></g></g><text x="600" y="610" text-anchor="middle" font-family="Inter, Arial" font-size="28" font-weight="700" fill="#f3ead2">Premium is useful. Handcuffs are expensive.</text></svg>